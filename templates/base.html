<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} · NS Route Status</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <div class="chrome">
      <header class="hero">
        <div class="hero__badge">NS Route Status</div>
        <div class="hero__main">
          <div>
            <p class="eyebrow">Past {{ window_days }} days</p>
            <h1>{{ page_title }}</h1>
            <p class="hero__subtitle">{{ page_subtitle }}</p>
          </div>
          <a class="hero__home" href="/">All routes</a>
        </div>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
  </html>
