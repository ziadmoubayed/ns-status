<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if is_index %}NS Route Status{% else %}{{ page_title }} · NS Route Status{% endif %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
  </head>
  <body>
    <div class="chrome">
      <header class="topbar">
        <div class="topbar__left">
          {% if not is_index %}<a class="topbar__back" href="/">←</a>{% endif %}
          <strong class="topbar__brand">NS Route Status</strong>
          <span class="topbar__sep">·</span>
          <span class="topbar__range">Past {{ window_days }} days</span>
        </div>
      </header>
      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
  </html>
